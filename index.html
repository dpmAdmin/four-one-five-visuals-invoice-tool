<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Four One Five Visuals Quote Builder</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <img src="assets/fv-icon.png" alt="Four One Five Visuals icon" class="logo" />
      <div>
        <p class="eyebrow">Four One Five Visuals</p>
        <h1>Quote Builder</h1>
        <p class="sub">Internal pricing tool for quick real estate media estimates.</p>
      </div>
    </header>

    <section class="grid">
      <div class="panel">
        <h2>Photography</h2>
        <label class="field">
          <span>Property Photos</span>
          <select id="photoPackage">
            <option value="0">None</option>
            <option value="250">0-999 sqft — $250</option>
            <option value="350">1,000-1,999 sqft — $350</option>
            <option value="450">2,000-2,999 sqft — $450</option>
            <option value="550">3,000-3,999 sqft — $550</option>
            <option value="650">4,000-4,999 sqft — $650</option>
            <option value="750">5,000-5,999 sqft — $750</option>
            <option value="2000">6,000+ sqft Drone Photos — $2,000</option>
          </select>
        </label>
        <div class="note">Drone section matches Open Homes pricing, plus $50.</div>
      </div>

      <div class="panel">
        <h2>Video</h2>
        <label class="field">
          <span>Property Video</span>
          <select id="videoPackage">
            <option value="0">None</option>
            <option value="2250">0-3,999 sqft — $2,250</option>
            <option value="3000">4,000-4,999 sqft — $3,000</option>
            <option value="0">5,000+ sqft — Custom Quote</option>
          </select>
        </label>
        <div class="qty-row">
          <label for="socialQty">Social Media Package</label>
          <div class="qty-wrap"><input id="socialQty" type="number" min="0" step="1" value="0" /><span>× $250</span></div>
        </div>
      </div>

      <div class="panel">
        <h2>Virtual Services</h2>
        <div class="qty-row"><label for="stagingQty">Virtual Staging</label><div class="qty-wrap"><input id="stagingQty" type="number" min="0" step="1" value="0" /><span>× $150</span></div></div>
        <div class="qty-row"><label for="declutterQty">Virtual Decluttering</label><div class="qty-wrap"><input id="declutterQty" type="number" min="0" step="1" value="0" /><span>× $200</span></div></div>
        <div class="qty-row"><label for="renoQty">Virtual Renovation</label><div class="qty-wrap"><input id="renoQty" type="number" min="0" step="1" value="0" /><span>× $350</span></div></div>
      </div>

      <div class="panel">
        <h2>Rush Services</h2>
        <label class="check"><input id="rushPhotos" type="checkbox" /> Rush Photos — $250</label>
        <label class="check"><input id="rushVideo" type="checkbox" /> Rush Video — $500</label>
      </div>

      <div class="panel">
        <h2>Adjustments</h2>
        <label class="field"><span>Discount $</span><input id="discountDollars" type="number" min="0" step="1" value="0" /></label>
        <label class="field"><span>Discount %</span><input id="discountPercent" type="number" min="0" max="100" step="1" value="0" /></label>
        <label class="field"><span>Travel Fee - over 10 miles</span><input id="travelFee" type="number" min="0" step="1" value="0" /></label>
        <label class="field"><span>Custom Line Item Name</span><input id="customName" type="text" placeholder="Optional" /></label>
        <label class="field"><span>Custom Line Item Amount</span><input id="customAmount" type="number" step="1" value="0" /></label>
      </div>

      <aside class="summary panel">
        <h2>Quote Total</h2>
        <div id="lineItems" class="line-items"></div>
        <div class="total"><span>Total</span><strong id="total">$0</strong></div>
        <label class="field"><span>Client / Property Notes</span><textarea id="notes" rows="5" placeholder="Address, agent, package notes, timing..."></textarea></label>
        <div class="actions">
          <button id="copyBtn">Copy Quote</button>
          <button id="printBtn">Print / Save PDF</button>
          <button id="resetBtn" class="secondary">Reset</button>
        </div>
      </aside>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
